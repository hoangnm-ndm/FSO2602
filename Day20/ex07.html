<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>

		<style>
			div {
				border: 2px solid black;
				color: blue;
			}
		</style>
	</head>
	<body>
		<div id="myDiv" style="color: red; background-color: yellow">Nội dung</div>

		<script>
			let div = document.getElementById("myDiv");

			// Truy cập thuộc tính CSS nội tuyến
			console.log(div.style.color); // "red"
			console.log(div.style.backgroundColor); // "yellow"
			console.log(div.style.border);
		</script>
	</body>
</html>
