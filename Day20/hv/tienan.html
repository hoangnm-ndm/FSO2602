<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<ul>
			<li>PHP</li>
			<li>Java</li>
			<li>JavaScript</li>
		</ul>
		<script>
			const list = ["banana", "tomato", "kiwi"];

			// * Dung JS thao tac de thay doi du lieu của danh sach hien thi bang data array da cho truoc

			const ul = document.querySelector("ul");
			ul.innerHTML = list
				.map((item) => {
					return `<li>${item}</li>`;
				})
				.join("");
		</script>
	</body>
</html>
