<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>

	<body>
		<ul>
			<li>PHP</li>
			<li>Java</li>
			<li>JavaScript</li>
		</ul>

		<script>
			const list = ["banana", "tomato", "kiwi"];
			const ul = document.querySelector("ul");
			let html = "";
			list.forEach((item) => {
				html += `<li>${item}</li>`;
			});

			ul.innerHTML = html;
		</script>
	</body>
</html>
