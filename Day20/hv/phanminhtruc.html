<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>

	<body>
		<ul>
			<li>PHP</li>
			<li>Java</li>
			<li>JavaScript</li>
		</ul>
		<script>
			const list = ["banana", "tomato", "kiwi", "chery"];
			const li = document.querySelectorAll("ul>li");
			console.log(li);
			li.forEach((item, index) => {
				item.innerHTML = list[index];
			});
			// * Dung JS thao tac de thay doi du lieu của danh sach hien thi bang data array da cho truoc
		</script>
	</body>
</html>
