<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<script>
			// Cú pháp
			let myTimeout = setTimeout(() => console.log("hello"), 3000);
			let myInterval = setInterval(() => console.log("bonjour!"), 2000);

			console.log(myTimeout);
			console.log(myInterval);

			clearTimeout(myTimeout);
			clearInterval(myInterval);

			console.log(myTimeout);
			console.log(myInterval);
		</script>
	</body>
</html>
