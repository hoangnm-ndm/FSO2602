<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			table {
				border-collapse: collapse;
			}

			th,
			td {
				border: 1px solid #000;
				padding: 10px;
				text-align: center;
			}

			th {
				background: #eee;
			}

			.score {
				color: red;
				font-weight: bold;
			}
		</style>
	</head>

	<body>
		<table class="table"></table>
		<script>
			const table = document.querySelector(".table");
			const students = [
				{ id: 1, name: "Nguyen Van A", age: 20, score: 8.5 },
				{ id: 2, name: "Le Thi B", age: 22, score: 7.0 },
				{ id: 3, name: "Tran Van C", age: 19, score: 9.0 },
				{ id: 4, name: "Pham Thi D", age: 21, score: 6.5 },
			];
			const max = Math.max(...students.map((item) => item.score));
			let header = "";
			let row = "";
			Object.keys(students[0]).map((item) => {
				header += `
                <th>
                    ${item}
                </th>
            `;
			});
			const h = Object.keys(students[0]);
			students.map((item) => {
				let td = "";
				h.map((key) => {
					td += `
                    <td>${item[key]}</td>
                `;
				});
				row += `
                <tr class="${item.score === max ? "socre" : ""}">
                    ${td}
                </tr>
                `;
			});
			table.innerHTML = `
        <thead>
            <tr>${header}</tr>
        </thead>
        <tbody>
            ${row}
        </tbody>
    `;
		</script>
	</body>
</html>
