<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			a:visited {
				color: gray;
			}

			a:hover {
				color: red;
			}

			input:focus {
				color: red;
			}

			input::placeholder {
				color: orange;
			}

			/* pseudo class: Style cho trạng thái, tính trạng, thuộc tính đặc biệt của phần tử. */
		</style>
	</head>
	<body>
		<a href="https://google.com">Google</a>
		<a href="https://google.com.vn">Google</a>

		<input type="text" placeholder="nhap email" />
	</body>
</html>
