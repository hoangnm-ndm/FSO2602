<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			.wrap > .child {
				color: blue;
			}
			.parent .child {
				color: red;
			}
		</style>
	</head>
	<body>
		<div class="parent">
			<div>
				<div>
					<div class="wrap">
						<div class="child">
							Lorem ipsum dolor sit amet consectetur adipisicing elit. Dicta,
							id!
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
