<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Bai 2</title>
		<style>
			.container {
				position: relative;
				width: 300px;
				height: 300px;
				background: rgba(0, 255, 0, 0.3);
				border: 2px solid red;
			}

			.box {
				position: absolute;
				width: 60px;
				height: 60px;
				background: #eac696;
				border-radius: 10px;
			}

			.top-left {
				top: 10px;
				left: 10px;
			}

			.top-right {
				top: 10px;
				right: 10px;
			}

			.bottom-left {
				bottom: 10px;
				left: 10px;
			}

			.bottom-right {
				bottom: 10px;
				right: 10px;
			}

			.center {
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="box top-left"></div>
			<div class="box top-right"></div>
			<div class="box bottom-left"></div>
			<div class="box bottom-right"></div>
			<div class="box center"></div>
		</div>
	</body>
</html>
