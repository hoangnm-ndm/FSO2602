<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			.container {
				position: relative;

				.box1 {
					position: absolute;
					width: 100px;
					height: 100px;
					background-color: rgb(66, 111, 66);
					border-radius: 50%;
					left: 0;
				}
				.box2 {
					position: absolute;
					width: 100px;
					height: 100px;
					background-color: rgb(66, 111, 66);
					border-radius: 50%;
					left: 30px;
				}
				.box3 {
					position: absolute;
					border-radius: 50%;
					width: 100px;
					height: 100px;
					background-color: rgb(66, 111, 66);
					left: 60px;
				}
				.box4 {
					position: absolute;
					border-radius: 50%;
					width: 100px;
					height: 100px;
					background-color: rgb(66, 111, 66);
					left: 90px;
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="box1"></div>
			<div class="box2"></div>
			<div class="box3"></div>
			<div class="box4"></div>
		</div>
	</body>
</html>
