<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			/* Bai 1 */
			.box {
				width: 50px;
				height: 50px;
				display: inline-block;
				background-color: rgba(0, 155, 0, 0.6);
				border-radius: 50%;
				position: relative;
			}
			.box2 {
				right: 30px;
			}
			.box3 {
				right: 60px;
			}
			.box4 {
				right: 90px;
			}

			/* Bai 2 */
			.box5 {
				width: 100px;
				height: 100px;
				position: relative;
				background-color: green;
				margin-top: 20px;
			}

			.boxx {
				width: 30px;
				height: 30px;
				background-color: red;
			}

			.box7 {
				position: absolute;
				top: 0px;
				left: 70px;
			}

			.box8 {
				position: absolute;
				bottom: 0;
				left: 70px;
			}

			.box9 {
				position: absolute;
				bottom: 0;
			}

			.box10 {
				position: absolute;
				left: 35px;
				top: 35px;
			}
		</style>
	</head>
	<body>
		<div class="box box1"></div>
		<div class="box box2"></div>
		<div class="box box3"></div>
		<div class="box box4"></div>

		<div class="box5">
			<div class="boxx box6"></div>
			<div class="boxx box7"></div>
			<div class="boxx box8"></div>
			<div class="boxx box9"></div>
			<div class="boxx box10"></div>
		</div>
	</body>
</html>
