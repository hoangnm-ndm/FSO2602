<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			.container {
				position: relative;
				width: 400px;
				height: 150px;
			}

			.box {
				position: absolute;
				width: 100px;
				height: 100px;
				border: 2px solid red;
				border-radius: 50%;
				background: rgba(0, 255, 0, 0.3);
			}

			.I1 {
				left: 0;
			}
			.I2 {
				left: 60px;
			}
			.I3 {
				left: 120px;
			}
			.I4 {
				left: 180px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="box I1"></div>
			<div class="box I2"></div>
			<div class="box I3"></div>
			<div class="box I4"></div>
		</div>
	</body>
</html>
