<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			.container {
				position: relative;
				width: 600px;
				height: 600px;
				border: 1px solid black;
				left: 20px;
				top: 20px;
				.box1 {
					position: absolute;
					width: 100px;
					height: 100px;
					background-color: rgb(66, 111, 66);
					border-radius: 8px;
					left: 0;
					top: 0;
				}
				.box2 {
					position: absolute;
					width: 100px;
					height: 100px;
					background-color: rgb(66, 111, 66);
					border-radius: 8px;
					right: 0;
					top: 0;
				}
				.box3 {
					position: absolute;
					width: 100px;
					height: 100px;
					background-color: rgb(66, 111, 66);
					border-radius: 8px;
					left: 0;
					bottom: 0;
				}
				.box4 {
					position: absolute;
					width: 100px;
					height: 100px;
					background-color: rgb(66, 111, 66);
					border-radius: 8px;
					right: 0;
					bottom: 0;
				}
				.box5 {
					position: absolute;
					width: 100px;
					height: 100px;
					background-color: rgb(66, 111, 66);
					border-radius: 8px;
					right: 50%;
					top: 50%;
					transform: translate(50%, -50%);
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="box1"></div>
			<div class="box2"></div>
			<div class="box3"></div>
			<div class="box4"></div>
			<div class="box5"></div>
		</div>
	</body>
</html>
