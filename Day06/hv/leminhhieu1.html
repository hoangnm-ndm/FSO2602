<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			.circle-group {
				display: flex;
			}

			.circle {
				width: 100px;
				height: 100px;
				border: 2px solid red;
				border-radius: 50%;
				background-color: rgba(45, 91, 45, 0.3);
				margin-left: -40px;
			}

			.circle:first-child {
				margin-left: 0;
			}
		</style>
	</head>

	<body>
		<div class="circle-group">
			<div class="circle"></div>
			<div class="circle"></div>
			<div class="circle"></div>
			<div class="circle"></div>
		</div>
	</body>
</html>
