<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			.box {
				position: relative;
				width: 200px;
				height: 200px;
				background-color: rgba(0, 255, 255, 0.451);
			}

			div[class*="box-"] {
				width: 30px;
				height: 30px;
				background-color: red;
				position: absolute;
			}

			.box-2 {
				top: 0;
				right: 0;
			}

			.box-3 {
				left: 0;
				bottom: 0;
			}

			.box-4 {
				right: 0;
				bottom: 0;
			}

			.box-5 {
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
			}
		</style>
	</head>

	<body>
		<div class="box">
			<div class="box-1"></div>
			<div class="box-2"></div>
			<div class="box-3"></div>
			<div class="box-4"></div>
			<div class="box-5"></div>
		</div>
	</body>
</html>
