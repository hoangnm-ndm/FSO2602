<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>

		<style>
			.heart {
				position: relative;
				width: 120px;
				height: 120px;
				background-color: red;
				transform: rotate(-45deg);
				margin: 50px auto;
				cursor: pointer;
			}

			.heart::before,
			.heart::after {
				position: absolute;
				width: 120px;
				height: 120px;
				background-color: red;
				border-radius: 50%;
				content: "";
			}

			.heart::before {
				top: -60px;
				left: 0;
			}

			.heart::after {
				left: 60px;
				top: 0;
			}
		</style>
	</head>
	<body>
		<div class="heart"></div>
	</body>
</html>
