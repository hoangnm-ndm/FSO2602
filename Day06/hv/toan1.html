<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>

		<style>
			.container {
				position: relative;
				width: 400px;
				height: 200px;

				.circle {
					width: 120px;
					height: 120px;
					border-radius: 50%;
					background-color: rgba(0, 128, 0, 0.226);
					border: 2px solid red;
					position: absolute;
				}
			}

			.h1 {
				left: 0;
			}
			.h2 {
				left: 60px;
			}
			.h3 {
				left: 120px;
			}
			.h4 {
				left: 180px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="circle h1"></div>
			<div class="circle h2"></div>
			<div class="circle h3"></div>
			<div class="circle h4"></div>
		</div>
	</body>
</html>
