<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>

		<style>
			.container {
				position: relative;
				width: 400px;
				height: 200px;
				background: #fff;
			}

			.circle {
				width: 120px;
				height: 120px;
				border-radius: 50%;
				border: 2px solid red;
				position: absolute;
				background: rgba(0, 200, 0, 0.3);
			}

			.c1 {
				left: 0;
			}
			.c2 {
				left: 60px;
			}
			.c3 {
				left: 120px;
			}
			.c4 {
				left: 180px;
			}
		</style>
	</head>

	<body>
		<div class="container">
			<div class="circle c1"></div>
			<div class="circle c2"></div>
			<div class="circle c3"></div>
			<div class="circle c4"></div>
		</div>
	</body>
</html>
