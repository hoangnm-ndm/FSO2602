<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>position</title>
		<style>
			* {
				padding: 0;
				margin: 0;
				box-sizing: border-box;
			}

			div[class*="cir"] {
				width: 100px;
				height: 100px;
				background-color: rgba(0, 200, 0, 0.5);
				border-radius: 50%;
			}

			.circle-2 {
				z-index: 1;
				position: relative;
				left: 50%;
			}

			.circle-3 {
				z-index: 2;
				position: relative;
				left: 50%;
			}

			.circle-4 {
				z-index: 3;
				position: relative;
				left: 50%;
			}
		</style>
	</head>

	<body>
		<div class="circle-1">
			<div class="circle-2">
				<div class="circle-3">
					<div class="circle-4"></div>
				</div>
			</div>
		</div>
	</body>
</html>
