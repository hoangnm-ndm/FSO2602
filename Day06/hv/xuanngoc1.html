<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Circles Overlap</title>
		<style>
			.box {
				width: 500px;
				height: 200px;
				position: relative;
				margin: 50px;
			}

			.circle {
				width: 150px;
				height: 150px;
				border: 2px solid red;
				background-color: rgba(0, 128, 0, 0.3);
				border-radius: 50%;
				position: absolute;
			}

			.c1 {
				left: 0;
			}
			.c2 {
				left: 80px;
			}
			.c3 {
				left: 160px;
			}
			.c4 {
				left: 240px;
			}
			.c5 {
				left: 320px;
			}
		</style>
	</head>
	<body>
		<div class="box">
			<div class="circle c1"></div>
			<div class="circle c2"></div>
			<div class="circle c3"></div>
			<div class="circle c4"></div>
			<div class="circle c5"></div>
		</div>
	</body>
</html>
