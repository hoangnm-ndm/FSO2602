<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			.box {
				width: 300px;
				height: 300px;
				border: 2px solid red;
				background-color: rgba(0, 128, 0, 0.3);
				position: relative;
			}

			.small {
				width: 70px;
				height: 70px;
				background-color: #d2b48c;
				border: 2px solid red;
				border-radius: 10px;
				position: absolute;
			}

			.top-left {
				top: 0px;
				left: 0px;
			}

			.top-right {
				top: 0px;
				right: 0px;
			}

			.center {
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
			}

			.bottom-left {
				bottom: 0px;
				left: 0px;
			}

			.bottom-right {
				bottom: 0px;
				right: 0px;
			}
		</style>
	</head>

	<body>
		<div class="box">
			<div class="small top-left"></div>
			<div class="small top-right"></div>
			<div class="small center"></div>
			<div class="small bottom-left"></div>
			<div class="small bottom-right"></div>
		</div>
	</body>
</html>
