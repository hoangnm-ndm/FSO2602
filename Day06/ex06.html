<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>

		<style>
			* {
				box-sizing: border-box;
				padding: 0;
				margin: 0;
			}

			.container {
				width: 300px;
				height: 300px;
				border: 2px solid red;

				display: flex;
				flex-direction: row;
				/* default value: row */
				flex-wrap: wrap;
				/* gap: 10px 20px; */
				/* row-gap: 30px; */
				/* column-gap: 40px; */

				justify-content: space-between;
				align-items: center;
				/* can cac phan tu theo truc phu (theo dong) */
				align-content: center;
				/* dieu khien cac dong - align-content thu su phat huy suc manh khi xuat hien xuong dong */
			}

			.child {
				background-color: greenyellow;
				border: 2px dashed red;
				width: 100px;
				height: 100px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="child">1</div>
			<div class="child">2</div>
			<div class="child">3</div>
			<div class="child">4</div>
		</div>
	</body>
</html>
