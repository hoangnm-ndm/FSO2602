<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>

		<style>
			.container {
				position: relative;
				width: 300px;
				height: 200px;
				background-color: lightgray;
			}

			.absolute-box {
				position: absolute;
				top: 50%;
				left: 50%;

				transform: translate(-50%, -50%);

				width: 100px;
				height: 50px;
				background-color: lightcoral;
			}
		</style>
	</head>
	<body>
		<!-- * absolute khiến thẻ lấy thẻ cha gần nhất có position khác static làm mốc, nếu không tìm được thẻ cha gần nhất thoả mãn thì sẽ follow theo body. -->
		<div class="container">
			This is a container.
			<div>
				<div>
					<div>
						<div class="absolute-box">Absolute Box</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
