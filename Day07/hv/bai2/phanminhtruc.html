<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Documnet</title>

		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				display: grid;
				grid-template-columns: repeat(12, 1fr);
				gap: 10px;
				padding: 20px;
				min-height: 100vh;
				grid-template-areas:
					"a a a a a a a a a a a a"
					"b b b b b b c c c c c c"
					"d d d d e e e e f f f f"
					"g g g h h h i i i j j j"
					"k k l l m m n n o o p p"
					"q r s t u v w x y z aa bb";
			}

			.item {
				background: #8bc34a;
				color: white;
				text-align: center;
				padding: 20px 0;
				font-weight: bold;
			}

			/* map từng item */
			.item:nth-child(1) {
				grid-area: a;
			}

			.item:nth-child(2) {
				grid-area: b;
			}

			.item:nth-child(3) {
				grid-area: c;
			}

			.item:nth-child(4) {
				grid-area: d;
			}

			.item:nth-child(5) {
				grid-area: e;
			}

			.item:nth-child(6) {
				grid-area: f;
			}

			.item:nth-child(7) {
				grid-area: g;
			}

			.item:nth-child(8) {
				grid-area: h;
			}

			.item:nth-child(9) {
				grid-area: i;
			}

			.item:nth-child(10) {
				grid-area: j;
			}

			.item:nth-child(11) {
				grid-area: k;
			}

			.item:nth-child(12) {
				grid-area: l;
			}

			.item:nth-child(13) {
				grid-area: m;
			}

			.item:nth-child(14) {
				grid-area: n;
			}

			.item:nth-child(15) {
				grid-area: o;
			}

			.item:nth-child(16) {
				grid-area: p;
			}

			.item:nth-child(17) {
				grid-area: q;
			}

			.item:nth-child(18) {
				grid-area: r;
			}

			.item:nth-child(19) {
				grid-area: s;
			}

			.item:nth-child(20) {
				grid-area: t;
			}

			.item:nth-child(21) {
				grid-area: u;
			}

			.item:nth-child(22) {
				grid-area: v;
			}

			.item:nth-child(23) {
				grid-area: w;
			}

			.item:nth-child(24) {
				grid-area: x;
			}

			.item:nth-child(25) {
				grid-area: y;
			}

			.item:nth-child(26) {
				grid-area: z;
			}

			.item:nth-child(27) {
				grid-area: aa;
			}

			.item:nth-child(28) {
				grid-area: bb;
			}
		</style>
	</head>

	<body>
		<div class="item">1</div>
		<div class="item">2</div>
		<div class="item">3</div>
		<div class="item">4</div>
		<div class="item">5</div>
		<div class="item">6</div>
		<div class="item">7</div>
		<div class="item">8</div>
		<div class="item">9</div>
		<div class="item">10</div>
		<div class="item">11</div>
		<div class="item">12</div>
		<div class="item">13</div>
		<div class="item">14</div>
		<div class="item">15</div>
		<div class="item">16</div>
		<div class="item">17</div>
		<div class="item">18</div>
		<div class="item">19</div>
		<div class="item">20</div>
		<div class="item">21</div>
		<div class="item">22</div>
		<div class="item">23</div>
		<div class="item">24</div>
		<div class="item">25</div>
		<div class="item">26</div>
		<div class="item">27</div>
		<div class="item">28</div>
	</body>
</html>
