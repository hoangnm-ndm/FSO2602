<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			.container {
				margin: auto;
				width: auto;
				height: 400px;
				border: 2px solid #888;
				display: grid;
				grid-template-rows: repeat(6, 1fr);
				grid-template-columns: repeat(12, 1fr);
				gap: 10px;
			}
			.item {
				background-color: rgb(156, 207, 14);
				text-align: center;
			}
			.item:nth-child(1) {
				grid-column: span 12;
			}
			.item:nth-child(2),
			.item:nth-child(3) {
				grid-column: span 6;
			}
			.item:nth-child(4),
			.item:nth-child(5),
			.item:nth-child(6) {
				grid-column: span 4;
			}
			.item:nth-child(7),
			.item:nth-child(8),
			.item:nth-child(9),
			.item:nth-child(10) {
				grid-column: span 3;
			}
			.item:nth-child(11),
			.item:nth-child(12),
			.item:nth-child(13),
			.item:nth-child(14),
			.item:nth-child(15),
			.item:nth-child(16) {
				grid-column: span 2;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="item">item1</div>
			<div class="item">item2</div>
			<div class="item">item3</div>
			<div class="item">item4</div>
			<div class="item">item5</div>
			<div class="item">item6</div>
			<div class="item">item7</div>
			<div class="item">item8</div>
			<div class="item">item9</div>
			<div class="item">item10</div>
			<div class="item">item11</div>
			<div class="item">item12</div>
			<div class="item">item13</div>
			<div class="item">item14</div>
			<div class="item">item15</div>
			<div class="item">item16</div>
			<div class="item">item17</div>
			<div class="item">item18</div>
			<div class="item">item19</div>
			<div class="item">item20</div>
			<div class="item">item21</div>
			<div class="item">item22</div>
			<div class="item">item23</div>
			<div class="item">item24</div>
			<div class="item">item25</div>
			<div class="item">item26</div>
			<div class="item">item27</div>
			<div class="item">item28</div>
		</div>
	</body>
</html>
