<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>

		<style>
			* {
				padding: 0;
				margin: 0;
				box-sizing: border-box;
			}

			html {
				font-family: Helvetica, sans-serif;
			}

			a {
				text-decoration: none;
			}

			.flex-center {
				display: flex;
				justify-content: center;
				align-items: center;
			}

			.flex-between {
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.w-100 {
				width: 100%;
				max-width: 100%;
			}
			body {
				background-color: #f9f9f9cc;
			}
			h1 {
				font-size: 24px;
				text-align: center;
				margin-top: 30vh;
				font-weight: 400;
				margin-bottom: 24px;
			}

			form {
				padding: 24px;
				border-radius: 12px;
				margin: 0 auto;
				width: 320px;
				background-color: #fff;
				font-size: 14px;

				.form-group {
					margin-bottom: 24px;
				}

				label {
					display: block;
					margin-bottom: 8px;
				}

				input {
					padding: 8px;
					background-color: #f9f9f9cc;
					border: 1px solid #d9d9d9;
					border-radius: 4px;
				}

				button {
					padding: 8px;
					background-color: #0088ff;
					border: none;
					border-radius: 8px;
					font-size: 16px;
					font-weight: bold;
					color: #fff;
					cursor: pointer;
					transition: all ease-in-out 0.5s;
					&:hover {
						background-color: #0088ff88;
					}
				}
			}
		</style>
	</head>
	<body>
		<h1>Login now!</h1>
		<form action="">
			<div class="form-group">
				<label for="">Email</label>
				<input class="w-100" type="email" placeholder="example@gmail.com" />
			</div>

			<div class="form-group">
				<label for="" class="flex-between">
					<span>Password</span>
					<a href="/forgot-password">Forgot password?</a>
				</label>
				<input class="w-100" type="password" placeholder="**********" />
			</div>

			<div class="form-group">
				<button class="w-100">Login</button>
			</div>

			<p>Don't have account? <a href="/signup">Create new account</a></p>
		</form>
	</body>
</html>
