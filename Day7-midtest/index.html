<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mid test</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
     <div class="background"></div>
     <div class="container">
        <div class="filter">
            <div class="input-container">
                <img class="icon" src="images/search-icon.svg" alt="Search Icon">
                <input type="text" placeholder="Search for a part-time job">
            </div>
            <button>
                <img class="map-icon" src="./images/map.svg"></img>
                Use map
            </button>
        </div>
        <div class="card-list">
            <div class="card card-1">
                <img class="card-img" src="images/furniture.svg" alt="Furniture">
                <h2>Furiture</h2>
            </div>
            <div class="card card-2">
                <img class="card-img" src="images/property.svg" alt="Property">
                <h2>Property</h2>
            </div>
            <div class="card card-3">
                <img class="card-img" src="images/job.svg" alt="Job">
                <h2>Job</h2>
            </div>
            <div class="card card-4">
                <img class="card-img" src="images/travel.svg" alt="Travel">
                <h2>Travel</h2>
            </div>
            <div class="card card-5">
                <img class="card-img" src="images/boat.svg" alt="Boat">
                <h2>Boat</h2>
            </div>
            <div class="card card-6">
                <img class="card-img" src="images/mc.svg" alt="MC">
                <h2>MC</h2>
            </div>
            <div class="card card-7">
                <img class="card-img" src="images/economy.svg" alt="Economy">
                <h2>Economy</h2>
            </div>
            <div class="card card-8">
                <img class="card-img" src="images/holiday.svg" alt="Holiday">
                <h2>Holiday</h2>
            </div>
        </div>
     </div>
</body>
</html>
