<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<style>
			.box-parent {
				width: 100px;
				height: 100px;
				background-color: red;
				/* transform: translate(100px, 100px); */
				transform: rotate(45deg);
			}
			.box-child {
				width: 50px;
				height: 50px;
				background-color: blue;
				position: fixed;
				bottom: 0;
				left: 0;
				color: #fff;
				transform: rotate(-45deg);
			}
		</style>
		<div class="box-parent">
			<div>
				<div>
					<div class="box-child">Content</div>
				</div>
			</div>
		</div>
	</body>
</html>
