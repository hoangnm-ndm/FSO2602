<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			.container {
				display: flex;

				&:hover {
					.box1 {
						transform: translateX(-30px);
					}

					.box2 {
						transform: translateX(30px);
					}
				}

				.box {
					width: 100px;
					height: 100px;
					background: red;
				}
			}
		</style>
	</head>

	<body>
		<div class="container">
			<div class="box box1"></div>
			<div class="box box2"></div>
		</div>
	</body>
</html>
