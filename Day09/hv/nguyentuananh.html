<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>css animation</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			.box {
				display: flex;
				margin-left: 300px;
				width: 200px;
				height: 100px;

				&:hover {
					.box-1 {
						transform: translateX(-100px);
					}

					.box-2 {
						transform: translateX(100px);
					}
				}

				.box-1,
				.box-2 {
					width: 100px;
					height: 100%;
					background-color: red;
					transition: all ease-in-out 0.5s;
				}
			}
		</style>
	</head>

	<body>
		<div class="box">
			<div class="box-1"></div>
			<div class="box-2"></div>
		</div>
	</body>
</html>
