<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<script>
			function taskA() {
				return new Promise((resolve, reject) => {
					setTimeout(() => {
						console.log("task A");
						resolve("Task A is done");
					}, 3000);
				});
			}

			function taskB() {
				return new Promise((resolve, reject) => {
					setTimeout(() => {
						console.log("task B");
						resolve("Task B is done");
					}, 2000);
				});
			}

			function taskC() {
				return new Promise((resolve, reject) => {
					setTimeout(() => {
						console.log("task C");
						resolve("Task C is done");
					}, 1000);
				});
			}

			taskA()
				.then((result) => {
					console.log("result: ", result);
					return taskB();
				})
				.then((result) => {
					console.log("result: ", result);
					return taskC();
				})
				.then((result) => {
					console.log("result: ", result);
					console.log("All tasks are done");
				})
				.catch((error) => {
					console.log(error);
				})
				.finally(() => {
					console.log("All tasks are done");
				});
		</script>
	</body>
</html>
