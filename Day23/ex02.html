<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<script>
			const myPromise = new Promise((resolve, reject) => {
				reject("That bai roi!"); // return
				resolve("Thanh cong roi!");
			});

			myPromise
				.then((result) => {
					console.log(result);
				})
				.catch((err) => {
					console.log(err);
				})
				.finally(() => {
					console.log("Clearn up!");
				});
		</script>
	</body>
</html>
