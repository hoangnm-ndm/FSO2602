<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Learn tailwind</title>
		<script src="https://cdn.tailwindcss.com?plugins=typography,forms,aspect-ratio"></script>
		<script>
			tailwind.config = {
				theme: {
					extend: {
						colors: {
							primary: "#281A51",
						},
						spacing: {
							128: "32rem",
						},
						fontFamily: {
							sans: ["Poppins", "sans-serif"],
						},
					},
				},
				// Kích hoạt các plugin chính thức nếu cần
				plugins: [
					// tailwind.plugin.lineClamp,
				],
			};
		</script>

		<style type="text/tailwindcss">
			@layer base {
				h1 {
					@apply text-2xl font-bold;
				}
				table {
					@apply border-collapse;
				}
			}

			@layer components {
				.btn {
					@apply p-4 bg-primary text-white rounded;
				}
			}
			@layer utilities {
				.content-auto {
					content-visibility: auto;
				}
			}
		</style>

		<link rel="stylesheet" href="./assets/css/main.css" />
	</head>
	<body>
		<div class="search-modal">
			<form action="">
				<div class="form-group">
					<label for="search"> kinh lup </label>
					<input type="text" id="search" />
				</div>
				<button class="btn">Use map</button>
			</form>
			<div class="card-group">
				<div class="card">
					<img src="./assets/imgs/furniture.svg" alt="" />
					<p class="text-primary">Furniture</p>
					<button class="border-2 border-primary rounded-md">click me</button>
				</div>
			</div>
		</div>
	</body>
</html>
