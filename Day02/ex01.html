<!DOCTYPE html>
<html lang="en">
	<head>
		<!-- Cấu hình cơ bản -->
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />

		<!-- SEO cơ bản -->
		<title>Tiêu đề trang của bạn</title>
		<meta
			name="description"
			content="Mô tả ngắn gọn về trang, tối đa 160 ký tự."
		/>
		<meta name="keywords" content="từ khóa 1, từ khóa 2, ..." />
		<link rel="canonical" href="https://example.com/" />

		<!-- Open Graph (Facebook, LinkedIn, Zalo, ...) -->
		<meta property="og:title" content="Tiêu đề khi chia sẻ" />
		<meta property="og:description" content="Mô tả khi chia sẻ." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://example.com/" />
		<meta property="og:image" content="https://example.com/og-image.jpg" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Tiêu đề Twitter" />
		<meta name="twitter:description" content="Mô tả Twitter" />
		<meta name="twitter:image" content="https://example.com/og-image.jpg" />

		<!-- Favicons & App icons -->
		<link rel="icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<title>FSO2602</title>
	</head>
	<body>
		<p>HTML = HyperText Markup Language - Ngôn ngữ đánh dấu siêu văn bản.</p>
		<p>Noi dung 1</p>
		<p>Noi dung 2</p>
		<p>Noi dung 3</p>
		<p>Noi dung 4 <span>vidu</span><b>bold</b> <strong>Nhan manh</strong></p>
		<!-- * div (division), span là html non-semantics - tức là không có ngữ nghĩa xác định, nghĩa chung chung. -->
		<div>
			<div>
				<div>
					<div>noi dung</div>
					<!-- thẻ div chỉ dùng để phân chia, không trực tiếp chứa nội dung -->
				</div>
			</div>
		</div>
	</body>
</html>
