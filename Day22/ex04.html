<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Product App</title>

		<!-- TAILWIND CDN -->
		<script src="https://cdn.tailwindcss.com"></script>

		<style>
			body {
				font-family: "Inter", sans-serif;
			}
		</style>
	</head>

	<body class="p-6 bg-slate-100">
		<div class="max-w-3xl mx-auto">
			<h2 class="mb-6 text-3xl font-semibold text-center text-blue-600">
				Product Manager
			</h2>

			<!-- FORM -->
			<div class="p-6 bg-white shadow-md rounded-xl">
				<form class="space-y-4 productForm">
					<div>
						<label class="block mb-1 font-medium">Product name</label>
						<input
							type="text"
							name="name"
							placeholder="Name..."
							required
							class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-400"
						/>
					</div>

					<div>
						<label class="block mb-1 font-medium">Price</label>
						<input
							type="number"
							name="price"
							placeholder="Price..."
							required
							class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-400"
						/>
					</div>

					<div>
						<label class="block mb-1 font-medium">Description</label>
						<textarea
							name="description"
							placeholder="Description..."
							class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-400"
						></textarea>
					</div>

					<button
						class="w-full py-2 font-medium text-white transition bg-blue-600 rounded-lg hover:bg-blue-700"
					>
						Add New
					</button>
				</form>
			</div>

			<!-- TABLE -->
			<div class="mt-6 overflow-hidden bg-white shadow rounded-xl">
				<table class="w-full text-center">
					<thead class="text-white bg-blue-600">
						<tr>
							<th class="py-2">ID</th>
							<th class="py-2">Title</th>
							<th class="py-2">Price</th>
							<th class="py-2 w-36">Action</th>
						</tr>
					</thead>
					<tbody class="product-body"></tbody>
				</table>
			</div>
		</div>

		<script>
			const urlAPI = "http://localhost:3000/products";
			const productTable = document.querySelector(".product-body");

			function renderUI() {
				let content = "";
				fetch(urlAPI)
					.then((res) => res.json())
					.then((data) => {
						if (data.length > 0) {
							data.forEach((item) => {
								content += `
                <tr class="border-b">
                  <td class="py-2">${item.id}</td>
                  <td class="py-2">${item.name}</td>
                  <td class="py-2">${item.price}</td>
                  <td class="py-2">
                    <button class="px-3 py-1 mr-1 text-white bg-red-500 rounded hover:bg-red-600">Delete</button>
                    <button class="px-3 py-1 text-white bg-yellow-400 rounded hover:bg-yellow-500">Update</button>
                  </td>
                </tr>
              `;
							});
						} else {
							content = `
              <tr>
                <td colspan="4" class="py-4 text-gray-500">Không có sản phẩm nào</td>
              </tr>`;
						}

						productTable.innerHTML = content;
					});
			}

			const productForm = document.querySelector(".productForm");

			productForm.addEventListener("submit", function (event) {
				event.preventDefault();

				const formData = new FormData(productForm);
				const data = Object.fromEntries(formData);

				fetch(urlAPI, {
					method: "POST",
					body: JSON.stringify(data),
					headers: { "Content-Type": "application/json" },
				})
					.then((res) => res.json())
					.then(() => {
						renderUI();
						productForm.reset();
					});
			});

			renderUI();
		</script>
	</body>
</html>
