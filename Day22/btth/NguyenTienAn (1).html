<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <div class="product-list"></div>
    <body>
        <script>
            const productList = document.querySelector('.product-list');
            const render = async () => {
                const productJson = await fetch(
                    'https://api-prod.tokyolife.vn/cms-api/api/app/catalog/filter/ao-thun-va-polo-nam?page=2&is_update_price=true&per_page=10',
                );

                const products = await productJson.json();

                productList.innerHTML = products.data.category.data.products
                    .map((product) => {
                        return `
                <div class="product-item">
                    <h4>${product.name}</h4>
                   
                </div>
            `;
                    })
                    .join('');
            };

            render();
        </script>
    </body>
</html>
