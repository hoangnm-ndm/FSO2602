<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- https://api-prod.tokyolife.vn/cms-api/api/app/catalog/filter/ao-thun-va-polo-nam?page=1&is_update_price=true&per_page=30 -->
    <!-- Lấy 10 sản phẩm ở page 2, theo cách phân trang cứ 10 sản phẩm 1 trang và hiển thị tên sản phẩm lên màn hình
    bằng API phía trên. -->
    <h1>Danh sach san pham</h1>

    <div class="products"></div>
    <script>
        const page = 2
        const productsEle = document.querySelector(".products")
        let content = ""
        fetch(`https://api-prod.tokyolife.vn/cms-api/api/app/catalog/filter/ao-thun-va-polo-nam?page=${page}&is_update_price=true&per_page=10`)
            .then(res => {
                return res.json()
            }).then(data => {
                data.data.category.data.products.forEach((item) => {
                    content += `
                        <h2>${item.name}</h2>
                    `
                });
                productsEle.innerHTML = content;
            })
            .then(error => console.log(error))
            .finally(() => console.log("ket thuc"))
    </script>
</body>

</html>
