<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <style>
      .left {
        width: 100px;
        height: 100px;
        border-radius: 0 50px 50px 0;
        background: red;
        display: inline-block;
      }
      .right {
        width: 100px;
        height: 100px;
        border-radius: 50px 0 0 50px;
        background: red;
        display: inline-block;
        margin-left: -4px;
      }
    </style>
    <div class="left"></div>
    <div class="right"></div>
  </body>
</html>
