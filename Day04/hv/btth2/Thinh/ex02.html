<html lang="en">
  <head>

  <body>
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <title>Diamond</title>

        <style>
         

          .top {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-top: 120px solid red;
          }

          .bottom {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 120px solid red;
          }
        </style>
      </head>

      <body>
          <div class="top"></div>
          <div class="bottom"></div>
        </div>
      </body>
    </html>
  </body>
</html>
