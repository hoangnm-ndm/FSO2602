<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			.blox1 {
				width: 0;
				height: 0;
				border-left: 50px solid transparent;
				border-right: 50px solid transparent;
				border-bottom: 100px solid red;
			}
			.blox2 {
				width: 0;
				height: 0;
				border-left: 50px solid transparent;
				border-right: 50px solid transparent;
				border-top: 100px solid red;
			}
			.blox3 {
				width: 100px;
				height: 70px;
				background-color: red;
				margin-top: 10px;
			}
			.blox4 {
				width: 0;
				height: 0;
				border-bottom: 36px solid transparent;
				border-top: 36px solid transparent;
				border-left: 70px solid red;
				margin-left: 100px;
				margin-top: -70px;

				/* * Khuyến nghị sử dụng inline-block */
			}
			.box5 {
				width: 100px;
				height: 100px;
				background-color: red;
				border-top-right-radius: 50%;
				border-bottom-right-radius: 50%;
				margin-top: 10px;
			}
			.box6 {
				width: 100px;
				height: 100px;
				background-color: red;
				border-radius: 50% 0 0 50%;
				margin-left: 100px;
				margin-top: -100px;
				/* Khuyến nghị dùng inline-block để các phần tử lên cùng dòng. */
			}
		</style>
	</head>
	<body>
		<div class="blox1"></div>
		<div class="blox2"></div>
		<div class="blox2"></div>
		<div class="blox1"></div>
		<div class="blox3"></div>
		<div class="blox4"></div>
		<div class="box5"></div>
		<div class="box6"></div>
	</body>
</html>
