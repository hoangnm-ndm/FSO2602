<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		button {
			border-radius: 12px;
			padding: 12px 24px;
			border: none;
			background-color: blue;
			color: #ffff;
			font-weight: 800;
		}

		.parent {
			background-color: red;
			width: 100px;
			height: 100px;
		}

		div.rounded {
			width: 100px;
			height: 100px;
			background-color: orange;
			border-radius: 50px; /*Giá trị của border thực ra bán kính của hình tròn */
		}

		.ve1 {
			width: 200px;
			height: 100px;
			background: red;
			border-radius: 100px 100px 0 0;
		}
		.ve2 {
			width: 200px;
			height: 100px;
			background: red;
			border-radius: 0 0 100px 100px;
			margin-left: 100px;
		}
	</style>

	<body>
		<button>Register now</button>

		<div class="parent">
			<div class="rounded"></div>
		</div>
		<div class="ve1"></div>
		<div class="ve2"></div>
	</body>
</html>
