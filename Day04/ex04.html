<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			* {
				box-sizing: border-box;
				padding: 0;
				margin: 0;
			}

			button {
				border-radius: 1000px;
				padding: 12px 24px;
				border: none;
				background-color: blue;
				color: #fff;
				font-weight: 800;
			}

			.parent {
				background-color: red;
				width: 100px;
				height: 100px;
			}

			div.rounded {
				width: 100px;
				height: 100px;
				background-color: orange;
				border-radius: 50px;
				/* * Giá trị của border-radius thực ra bán kính của cung tròn */
			}
		</style>
	</head>
	<body>
		<button>Register now!</button>

		<div class="parent">
			<div class="rounded"></div>
		</div>
	</body>
</html>
