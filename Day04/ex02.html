<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			* {
				box-sizing: border-box;
				padding: 0;
				margin: 0;
				/* reset CSS: Bỏ các thuộc tính mà trình duyệt tự động ép cho các phần tử. */
			}

			p {
				width: 200px;
				height: 100px;
				border: 3px solid red;
				margin: 0 auto;
				/* 1. khi đặt margin auto, kích thước không gian khả dụng sẽ được tự tính toán để chia đều cho 2 bên. */

				/* margin: Có thể nhận giá trị âm */
			}

			.p2 {
				margin-top: -10px;
				background-color: rgba(0, 200, 0, 0.5);
			}
		</style>
	</head>
	<body>
		<p class="p1">1</p>
		<p class="p2">2</p>
		<p class="p3">3</p>

		<!-- <ul>
			<li>item-01</li>
			<li>item-02</li>
			<li>item-03</li>
		</ul> -->
	</body>
</html>
