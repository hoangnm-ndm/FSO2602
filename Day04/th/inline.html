<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>

		<style>
			* {
				padding: 0;
				margin: 0;
				box-sizing: border-box;
			}

			.group {
				margin: 100px auto 0;
				text-align: center;
			}
			a {
				display: inline-block;
				margin: 0 12px 12px 0;
				padding: 10px;
				text-decoration: none;
				background-color: slategrey;
				border-radius: 8px;
				color: #fff;
			}
		</style>
		<!-- ? Tại sao nên padding vào thẻ a và button? -->
		<!-- * Vì hỗ trợ người dùng khó bấm trượt hơn, tăng trải nghiệm. -->

		<!-- ? Em biết bao nhiêu cách căn giữa 1 phần tử HTML? -->
		<!-- ? Anh có 1 đoạn văn (thẻ p) chưa biết rõ là dài bao nhiêu, nhưng anh muốn nó luôn phủ kín 100% diện tích của màn hình (không thừa, không thiếu)-->
	</head>
	<body>
		<div class="group">
			<a href="">New York</a>
			<a href="">New York</a>
			<a href="">New York</a>
			<a href="">New York</a>
			<a href="">New York</a>
		</div>
	</body>
</html>
