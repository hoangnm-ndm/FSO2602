<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<style>
			.outlined-button {
				padding: 10px 20px;
				font-size: 16px;
				border: none;
				outline: 2px dashed red; /* Đường viền outline màu đỏ, kiểu dashed, rộng 2px */
			}

			.outlined-button:focus {
				outline: 4px solid blue; /* Đổi thành viền màu xanh khi phần tử được focus */
			}

			.boxshadow {
				box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px,
					rgba(0, 0, 0, 0.3) 0px 30px 60px -30px,
					rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;
			}
		</style>

		<button class="outlined-button">Click Me!</button>
	</body>
</html>
